<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SFX ACADEMIC - Donasi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.title{
    text-align:center;
    margin-bottom:40px;
}

.title h1{
    font-size:48px;
    font-weight:700;
    background:linear-gradient(90deg,#00d4ff,#ffffff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.title p{
    color:#bcbcbc;
    margin-top:10px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:#181818;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
    padding:30px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#00d4ff;
}

.card h2{
    margin-bottom:20px;
    font-size:24px;
}

.payment-box{
    display:flex;
    align-items:center;
    gap:15px;
    background:#101010;
    padding:15px;
    border-radius:18px;
    margin-bottom:15px;
}

.payment-box img{
    width:60px;
    height:60px;
    object-fit:contain;
    background:white;
    padding:8px;
    border-radius:12px;
}

.payment-info h3{
    font-size:18px;
    margin-bottom:5px;
}

.payment-info p{
    color:#cfcfcf;
    font-size:15px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#d4d4d4;
}

.form-group input,
.form-group textarea,
.form-group select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#111;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#00d4ff,#006eff);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.list-donasi{
    margin-top:20px;
}

.donatur{
    background:#101010;
    border-radius:18px;
    padding:18px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.05);
}

.donatur h4{
    margin-bottom:6px;
}

.nominal{
    color:#00d4ff;
    font-weight:600;
    margin-bottom:8px;
}

.ucapan{
    margin-top:20px;
    background:#111;
    border-radius:18px;
    padding:18px;
    border:1px solid rgba(255,255,255,0.05);
    display:none;
}

footer{
    text-align:center;
    margin-top:40px;
    color:#999;
    font-size:14px;
}

@media(max-width:768px){
    .title h1{
        font-size:34px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="title">
        <h1>SFX ACADEMIC</h1>
        <p>Terima kasih sudah mendukung perjalanan dan perkembangan komunitas kami ❤️</p>
    </div>

    <div class="grid">

        <div class="card">

            <h2>Metode Donasi</h2>

            <div class="payment-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" alt="GoPay">
                <div class="payment-info">
                    <h3>GoPay</h3>
                    <p>085261616060</p>
                </div>
            </div>

            <div class="payment-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Bank_Central_Asia.svg" alt="BCA">
                <div class="payment-info">
                    <h3>Bank BCA</h3>
                    <p>1751195350</p>
                </div>
            </div>

            <div class="payment-box">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Bank_Syariah_Indonesia.svg" alt="BSI">
                <div class="payment-info">
                    <h3>Bank BSI</h3>
                    <p>1059612472</p>
                </div>
            </div>

        </div>

        <div class="card">

            <h2>Form Donasi</h2>

            <div class="form-group">
                <label>Nama Donatur</label>
                <input type="text" id="nama" placeholder="Masukkan nama">
            </div>

            <div class="form-group">
                <label>Nominal Donasi</label>
                <input type="number" id="nominal" placeholder="Bebas isi berapa saja">
            </div>

            <div class="form-group">
                <label>Metode Pembayaran</label>
                <select id="metode">
                    <option>GoPay</option>
                    <option>BCA</option>
                    <option>BSI</option>
                </select>
            </div>

            <div class="form-group">
                <label>Pesan</label>
                <textarea id="pesan" placeholder="Tulis pesan untuk SFX ACADEMIC"></textarea>
            </div>

            <button onclick="kirimDonasi()">Saya Sudah Donasi</button>

            <div class="ucapan" id="ucapanBox"></div>

        </div>

    </div>

    <div class="card list-donasi">

        <h2>Member Yang Sudah Donasi</h2>

        <div id="donasiList"></div>

    </div>

    <footer>
        © 2026 SFX ACADEMIC — Terima kasih atas dukungannya ❤️
    </footer>

</div>

<script>

const ucapanRandom = [
"Terima kasih banyak atas dukungannya ❤️",
"Donasi kamu sangat berarti untuk kami 🙏",
"Semoga segala kebaikan kembali kepada kamu ✨",
"Terima kasih sudah mendukung perjalanan SFX ACADEMIC 🚀",
"Kami sangat menghargai bantuan dan support kamu 💙",
"Support kamu membantu kami terus berkembang 🔥"
];

function formatRupiah(angka){
    return new Intl.NumberFormat('id-ID',{
        style:'currency',
        currency:'IDR'
    }).format(angka);
}

function kirimDonasi(){

    const nama = document.getElementById("nama").value;
    const nominal = document.getElementById("nominal").value;
    const pesan = document.getElementById("pesan").value;
    const metode = document.getElementById("metode").value;

    if(!nama || !nominal){
        alert("Lengkapi data terlebih dahulu!");
        return;
    }

    const randomText = ucapanRandom[Math.floor(Math.random()*ucapanRandom.length)];

    const donasiHTML = `
        <div class="donatur">
            <h4>${nama}</h4>
            <div class="nominal">${formatRupiah(nominal)}</div>
            <p>${pesan}</p>
            <small>Pembayaran melalui ${metode}</small>
        </div>
    `;

    document.getElementById("donasiList").innerHTML += donasiHTML;

    const ucapanBox = document.getElementById("ucapanBox");

    ucapanBox.style.display = "block";

    ucapanBox.innerHTML = `
        <h3>Donasi Berhasil 🎉</h3>
        <p>${randomText}</p>
    `;

    fetch("https://formsubmit.co/ajax/samudraprofx@gmail.com", {
        method:"POST",
        headers:{
            'Content-Type':'application/json',
            'Accept':'application/json'
        },
        body:JSON.stringify({
            nama:nama,
            nominal:nominal,
            metode:metode,
            pesan:pesan
        })
    });

    document.getElementById("nama").value = "";
    document.getElementById("nominal").value = "";
    document.getElementById("pesan").value = "";

}
</script>

</body>
</html>
